<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="1" />
      <stop offset="40%" stop-color="#2563eb" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#0b1120" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0" />
    </radialGradient>
  </defs>
  
  <!-- Deep tech background -->
  <rect width="800" height="400" fill="#040710" />
  
  <!-- Subtle hexagon or grid pattern could be complex to code manually. We'll use horizontal and vertical grid lines -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.3">
    <!-- Horizontal -->
    <line x1="0" y1="50" x2="800" y2="50" />
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="150" x2="800" y2="150" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="250" x2="800" y2="250" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="0" y1="350" x2="800" y2="350" />
    <!-- Vertical -->
    <line x1="100" y1="0" x2="100" y2="400" />
    <line x1="200" y1="0" x2="200" y2="400" />
    <line x1="300" y1="0" x2="300" y2="400" />
    <line x1="400" y1="0" x2="400" y2="400" />
    <line x1="500" y1="0" x2="500" y2="400" />
    <line x1="600" y1="0" x2="600" y2="400" />
    <line x1="700" y1="0" x2="700" y2="400" />
  </g>
  
  <!-- Radar/Scanner effect -->
  <line x1="0" y1="0" x2="800" y2="0" stroke="#0ea5e9" opacity="0.1" stroke-width="150">
    <animate attributeName="y1" values="-100;500;-100" dur="6s" repeatCount="indefinite" ease="in-out"/>
    <animate attributeName="y2" values="-100;500;-100" dur="6s" repeatCount="indefinite" ease="in-out"/>
  </line>

  <!-- Left Side: Terminal / Intelligent Support -->
  <g transform="translate(60, 100)" font-family="monospace" font-size="13" font-weight="500" fill="#38bdf8">
    <text x="0" y="0">> BOOTING CORE_AI...</text>
    <text x="0" y="35" opacity="0">
      > ESTABLISHING SECURE CONNECTION
      <animate attributeName="opacity" values="0;1;1;0" dur="8s" repeatCount="indefinite" begin="1s"/>
    </text>
    <text x="0" y="70" opacity="0">
      > ANALYZING QUERY VECTORS
      <animate attributeName="opacity" values="0;1;1;0" dur="8s" repeatCount="indefinite" begin="2s"/>
    </text>
    <text x="0" y="105" opacity="0">
      > GENERATING RESPONSE MODELS
      <animate attributeName="opacity" values="0;1;1;0" dur="8s" repeatCount="indefinite" begin="3s"/>
    </text>
    <text x="0" y="140" opacity="0" fill="#22c55e">
      > ASSISTANT ACTION [DEPLOYED]
      <animate attributeName="opacity" values="0;1;1;0" dur="8s" repeatCount="indefinite" begin="4s"/>
    </text>
    
    <!-- Moving data blocks (visualizing processing) -->
    <rect x="0" y="180" width="30" height="6" fill="#0ea5e9" opacity="0.8" rx="3">
        <animate attributeName="width" values="30; 180; 60; 220; 30" dur="4s" repeatCount="indefinite" ease="in-out"/>
    </rect>
    <rect x="0" y="200" width="60" height="6" fill="#a855f7" opacity="0.8" rx="3">
        <animate attributeName="width" values="60; 120; 190; 100; 60" dur="3s" repeatCount="indefinite" ease="in-out"/>
    </rect>
    <rect x="0" y="220" width="20" height="6" fill="#22c55e" opacity="0.8" rx="3">
        <animate attributeName="width" values="20; 90; 150; 60; 20" dur="5s" repeatCount="indefinite" ease="in-out"/>
    </rect>
  </g>
  
  <!-- Right Side: Analytics & Machine Learning Visual -->
  <g transform="translate(680, 150)">
    <!-- Loading Circle -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="#1e293b" stroke-width="4"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#0ea5e9" stroke-width="4" stroke-dasharray="314" stroke-dashoffset="314" stroke-linecap="round">
        <animate attributeName="stroke-dashoffset" values="314; 0; 314" dur="6s" repeatCount="indefinite"/>
    </circle>
    
    <text x="0" y="6" font-family="sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
        100%
    </text>
    <text x="0" y="80" font-family="sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle" letter-spacing="2">
        SYNC
    </text>
    
    <!-- Floating nodes -->
    <circle cx="-50" cy="-80" r="4" fill="#a855f7">
       <animate attributeName="cy" values="-80; -90; -80" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="-110" r="6" fill="#0ea5e9">
       <animate attributeName="cy" values="-110; -100; -110" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="-70" r="3" fill="#22c55e">
       <animate attributeName="cy" values="-70; -80; -70" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Lines connecting nodes -->
    <path d="M -50 -80 L 20 -110 L 60 -70 L 0 -50" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.4">
       <animate attributeName="opacity" values="0.2; 0.8; 0.2" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Center: AI Core Hologram -->
  <g transform="translate(400, 200)">
    <!-- Extensive Glow Base -->
    <circle cx="0" cy="0" r="140" fill="url(#glow)">
        <animate attributeName="r" values="120; 150; 120" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5; 0.8; 0.5" dur="3s" repeatCount="indefinite"/>
    </circle>

    <!-- Complex Outer Ring -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="#0284c7" stroke-width="1" stroke-dasharray="2 6">
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="30s" repeatCount="indefinite"/>
    </circle>

    <!-- Tracking Orbit Elements -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
      <circle cx="90" cy="0" r="4" fill="#fff" filter="drop-shadow(0 0 5px #0ea5e9)"/>
      <circle cx="-90" cy="0" r="4" fill="#fff" filter="drop-shadow(0 0 5px #0ea5e9)"/>
    </g>

    <!-- Tech Ring 1 -->
    <circle cx="0" cy="0" r="90" fill="none" stroke="#0ea5e9" stroke-width="3" stroke-dasharray="30 15 10 20 80 15">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="15s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Tech Ring 2 (Counter-rotating, Purple accent) -->
    <circle cx="0" cy="0" r="75" fill="none" stroke="#a855f7" stroke-width="2" stroke-dasharray="100 40 20 40" opacity="0.9">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="10s" repeatCount="indefinite"/>
    </circle>

    <!-- Inner Data Particles (Static structure spinning) -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="5s" repeatCount="indefinite"/>
      <circle cx="40" cy="0" r="2" fill="#38bdf8"/>
      <circle cx="-20" cy="34" r="2" fill="#38bdf8"/>
      <circle cx="-20" cy="-34" r="2" fill="#38bdf8"/>
    </g>
    
    <!-- Heart of the AI -->
    <circle cx="0" cy="0" r="40" fill="url(#innerGlow)">
        <animate attributeName="r" values="35; 42; 35" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="20" fill="#fff">
        <animate attributeName="r" values="18; 22; 18" dur="0.75s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
